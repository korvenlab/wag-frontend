<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wagoo — Pitch Next</title>
<meta name="robots" content="noindex" />
<style>
  :root{
    --green:#64b34d;
    --green-deep:#4d8f3b;
    --ink:#05070a;
    --neon:#eafff1;
    --muted:rgba(255,255,255,.55);
    --glass:rgba(255,255,255,.04);
    --stroke:rgba(255,255,255,.10);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ min-height:100%; }
  body{
    background:
      radial-gradient(1200px 700px at 18% 12%, rgba(100,179,77,.14), transparent 60%),
      radial-gradient(1000px 800px at 88% 88%, rgba(100,179,77,.10), transparent 55%),
      radial-gradient(900px 900px at 50% 50%, rgba(255,255,255,.03), transparent 60%),
      var(--ink);
    color:#fff;
    font-family:"Inter","Segoe UI",system-ui,-apple-system,Arial,sans-serif;
    letter-spacing:-.01em;
    -webkit-font-smoothing:antialiased;
  }

  .grid{
    position:fixed; inset:-2px; z-index:0; opacity:.35; pointer-events:none;
    background-image:
      linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px);
    background-size:64px 64px;
    mask-image:radial-gradient(circle at 50% 45%, #000 28%, transparent 78%);
    animation:drift 18s linear infinite;
  }
  @keyframes drift{ to{ background-position:64px 64px, 64px 64px; } }
  .vignette{
    position:fixed; inset:0; z-index:1; pointer-events:none;
    background:radial-gradient(120% 120% at 50% 40%, transparent 55%, rgba(0,0,0,.55) 100%);
  }

  .wrap{
    position:relative; z-index:2;
    max-width:760px; margin:0 auto;
    padding:36px 22px 56px;
  }

  .hud{
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    margin-bottom:36px;
  }
  .brand{ display:flex; align-items:center; gap:12px; }
  .brand img{
    height:30px; width:auto; display:block;
    filter:drop-shadow(0 0 12px rgba(100,179,77,.45));
  }
  .brand small{
    font-weight:700; color:var(--muted);
    letter-spacing:.28em; text-transform:uppercase; font-size:11px;
  }
  .status{
    display:inline-flex; align-items:center; gap:8px;
    padding:10px 14px; border-radius:999px;
    border:1px solid var(--stroke); background:var(--glass);
    backdrop-filter:blur(8px);
    font-size:12px; font-weight:800; color:var(--muted);
  }
  .status .dot{
    width:8px; height:8px; border-radius:50%; background:var(--green);
    box-shadow:0 0 12px rgba(100,179,77,.95);
  }

  .logo-wrap{
    position:relative; display:flex; justify-content:center; margin:8px 0 22px;
  }
  .logo-wrap::before{
    content:""; position:absolute; width:70%; height:180%;
    background:radial-gradient(circle, rgba(100,179,77,.28), transparent 65%);
    filter:blur(10px); z-index:-1;
  }
  .logo-mark{
    width:min(280px,58vw); height:auto; display:block;
    filter:drop-shadow(0 12px 40px rgba(100,179,77,.45));
  }

  .eyebrow{
    display:inline-flex; margin-bottom:14px; padding:8px 14px; border-radius:999px;
    border:1px solid rgba(100,179,77,.4); background:rgba(100,179,77,.1);
    color:var(--green); font-size:11px; font-weight:900; letter-spacing:.2em; text-transform:uppercase;
  }
  h1{
    font-size:clamp(34px,5.5vw,56px); font-weight:900;
    letter-spacing:-.035em; line-height:1.02; text-align:center;
  }
  h1 .g{ color:var(--green); position:relative; }
  h1 .g::after{
    content:""; position:absolute; left:0; right:0; bottom:.08em; height:4px; border-radius:9px;
    background:rgba(100,179,77,.55); box-shadow:0 0 14px rgba(100,179,77,.7);
  }
  .hint{
    margin:14px auto 0; max-width:520px; text-align:center;
    color:var(--muted); font-size:15px; font-weight:600; line-height:1.45;
  }
  .hint code{
    color:var(--neon); background:rgba(255,255,255,.06);
    border:1px solid var(--stroke); padding:2px 8px; border-radius:8px; font-size:12px;
  }

  .block{ margin-top:34px; }
  .block-title{
    font-size:11px; font-weight:900; letter-spacing:.2em; text-transform:uppercase;
    color:var(--muted); margin-bottom:14px; text-align:center;
  }

  .grid-btns{ display:grid; gap:12px; }
  .grid-btns.two{ grid-template-columns:1fr 1fr; }
  @media (max-width:560px){ .grid-btns.two{ grid-template-columns:1fr; } }

  .btn{
    appearance:none; cursor:pointer; width:100%;
    display:flex; align-items:center; gap:14px; text-align:left;
    padding:18px 18px; border-radius:24px;
    border:1px solid var(--stroke); background:var(--glass);
    color:#fff; font:inherit;
    backdrop-filter:blur(8px);
    transition:border-color .2s, box-shadow .2s, transform .2s, background .2s;
  }
  .btn:hover{
    border-color:rgba(255,255,255,.28);
    transform:translateY(-2px);
    box-shadow:0 12px 30px rgba(0,0,0,.35);
  }
  .btn.on{
    border-color:rgba(100,179,77,.75);
    background:rgba(100,179,77,.14);
    box-shadow:0 0 32px rgba(100,179,77,.32), inset 0 0 24px rgba(100,179,77,.06);
  }
  .btn .n{
    flex:none; width:44px; height:44px; border-radius:16px;
    display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,.05); border:1px solid var(--stroke);
    font-weight:900; color:var(--muted);
  }
  .btn.on .n{
    background:rgba(100,179,77,.2); border-color:rgba(100,179,77,.45); color:var(--green);
    box-shadow:0 0 16px rgba(100,179,77,.35);
  }
  .btn .t{ font-size:16px; font-weight:900; letter-spacing:-.02em; }
  .btn .d{ margin-top:3px; font-size:12px; font-weight:600; color:var(--muted); }

  .valores{
    opacity:.4; pointer-events:none; transition:opacity .35s ease, transform .35s ease;
    transform:translateY(6px);
  }
  .valores.active{ opacity:1; pointer-events:auto; transform:none; }

  .foot{
    margin-top:36px; display:flex; justify-content:center;
  }
  .open-pitch{
    display:inline-flex; align-items:center; gap:10px;
    padding:16px 28px; border-radius:16px; text-decoration:none;
    background:#fff; color:#05070a; font-weight:900; font-size:15px;
    box-shadow:0 0 30px rgba(255,255,255,.22);
    transition:transform .2s, box-shadow .2s;
  }
  .open-pitch:hover{ transform:translateY(-1px); box-shadow:0 0 36px rgba(255,255,255,.32); }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="vignette"></div>

  <div class="wrap">
    <div class="hud">
      <div class="brand">
        <img src="/logo.png" alt="Wagoo" />
        <small>by Korven Lab</small>
      </div>
      <div class="status"><span class="dot"></span> <span id="live">Pronto para controlar /pitch</span></div>
    </div>

    <div class="logo-wrap">
      <img class="logo-mark" src="/logo.png" alt="Wagoo" />
    </div>

    <div style="text-align:center">
      <div class="eyebrow">Pitch Next · Controle</div>
      <h1>Central de<br><span class="g">controle.</span></h1>
      <p class="hint">
        Abra <code>/pitch</code> no projetor. Os botões abaixo mudam essa tela em tempo real —
        mesmo visual, só o comando.
      </p>
    </div>

    <div class="block">
      <div class="block-title">Escolher apresentação</div>
      <div class="grid-btns">
        <button type="button" class="btn on" id="btn-fluxo" data-mode="fluxo">
          <span class="n">A</span>
          <span>
            <div class="t">Fluxo Wagoo</div>
            <div class="d">Animação — “Sua agenda no automático”</div>
          </span>
        </button>
        <button type="button" class="btn" id="btn-valores" data-mode="valores">
          <span class="n">B</span>
          <span>
            <div class="t">Valores &amp; números</div>
            <div class="d">Mercado, concorrência, margem e roadmap</div>
          </span>
        </button>
      </div>
    </div>

    <div class="block valores" id="valores-panel">
      <div class="block-title">Slides de valor</div>
      <div class="grid-btns two">
        <button type="button" class="btn slide-btn" data-slide="mercado">
          <span class="n">01</span>
          <span><div class="t">Mercado</div><div class="d">TAM · SAM · SOM</div></span>
        </button>
        <button type="button" class="btn slide-btn" data-slide="concorrencia">
          <span class="n">02</span>
          <span><div class="t">Concorrência</div><div class="d">Tabela 2026</div></span>
        </button>
        <button type="button" class="btn slide-btn" data-slide="margens">
          <span class="n">03</span>
          <span><div class="t">Margens</div><div class="d">88,4% · Unit economics</div></span>
        </button>
        <button type="button" class="btn slide-btn" data-slide="roadmap">
          <span class="n">04</span>
          <span><div class="t">Roadmap</div><div class="d">Ano 1 · R$ 210.834</div></span>
        </button>
      </div>
    </div>

    <div class="foot">
      <a class="open-pitch" href="/pitch" target="_blank" rel="noopener">Abrir /pitch no projetor →</a>
    </div>
  </div>

<script>
  const CHANNEL = "wagoo-pitchnext";
  const STORAGE = "wagoo-pitchnext-state";
  const bc = ("BroadcastChannel" in window) ? new BroadcastChannel(CHANNEL) : null;
  const live = document.getElementById("live");
  const valoresPanel = document.getElementById("valores-panel");
  const btnFluxo = document.getElementById("btn-fluxo");
  const btnValores = document.getElementById("btn-valores");
  const slideBtns = [...document.querySelectorAll(".slide-btn")];

  let state = { mode: "fluxo", slide: "mercado" };

  function persist(){
    localStorage.setItem(STORAGE, JSON.stringify(state));
    if(bc) bc.postMessage({ type: "pitch", ...state });
    localStorage.setItem(STORAGE + ":tick", String(Date.now()));
  }

  function paint(){
    btnFluxo.classList.toggle("on", state.mode === "fluxo");
    btnValores.classList.toggle("on", state.mode === "valores");
    valoresPanel.classList.toggle("active", state.mode === "valores");
    slideBtns.forEach((b) => b.classList.toggle("on", state.mode === "valores" && b.dataset.slide === state.slide));
    live.textContent = state.mode === "fluxo"
      ? "Projetor: Fluxo Wagoo"
      : `Projetor: ${({mercado:"Mercado",concorrencia:"Concorrência",margens:"Margens",roadmap:"Roadmap"})[state.slide] || state.slide}`;
  }

  function setMode(mode){
    state.mode = mode;
    if(mode === "valores" && !state.slide) state.slide = "mercado";
    paint();
    persist();
  }

  function setSlide(slide){
    state.mode = "valores";
    state.slide = slide;
    paint();
    persist();
  }

  btnFluxo.addEventListener("click", () => setMode("fluxo"));
  btnValores.addEventListener("click", () => {
    setMode("valores");
    setSlide(state.slide || "mercado");
  });
  slideBtns.forEach((b) => b.addEventListener("click", () => setSlide(b.dataset.slide)));

  addEventListener("keydown", (e) => {
    if(e.key.toLowerCase() === "a" || e.key === "0") setMode("fluxo");
    if(e.key.toLowerCase() === "b") { setMode("valores"); setSlide(state.slide || "mercado"); }
    const map = { "1":"mercado", "2":"concorrencia", "3":"margens", "4":"roadmap" };
    if(map[e.key]) setSlide(map[e.key]);
    if(state.mode === "valores" && (e.key === "ArrowRight" || e.key === "ArrowLeft")){
      const order = ["mercado","concorrencia","margens","roadmap"];
      const i = order.indexOf(state.slide);
      const next = e.key === "ArrowRight"
        ? order[Math.min(order.length - 1, i + 1)]
        : order[Math.max(0, i - 1)];
      setSlide(next);
    }
  });

  try{
    const saved = JSON.parse(localStorage.getItem(STORAGE) || "null");
    if(saved?.mode) state = { mode: saved.mode, slide: saved.slide || "mercado" };
  }catch{}
  paint();
  persist();
</script>
</body>
</html>
