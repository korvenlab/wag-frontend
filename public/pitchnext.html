<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wagoo — Pitch Next (Controle)</title>
<meta name="robots" content="noindex" />
<style>
  :root{
    --green:#64b34d;
    --green-deep:#4d8f3b;
    --ink:#05070a;
    --muted:rgba(255,255,255,.55);
    --glass:rgba(255,255,255,.05);
    --stroke:rgba(255,255,255,.12);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ min-height:100%; }
  body{
    background:
      radial-gradient(900px 500px at 20% 0%, rgba(100,179,77,.16), transparent 55%),
      radial-gradient(800px 600px at 100% 100%, rgba(100,179,77,.08), transparent 50%),
      var(--ink);
    color:#fff;
    font-family:"Inter","Segoe UI",system-ui,-apple-system,Arial,sans-serif;
    letter-spacing:-.01em;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:720px; margin:0 auto;
    padding:32px 20px 48px;
  }
  .brand{
    display:flex; align-items:center; gap:12px; margin-bottom:10px;
  }
  .brand img{ height:28px; filter:drop-shadow(0 0 12px rgba(100,179,77,.45)); }
  .brand small{
    color:var(--muted); font-size:10px; font-weight:800;
    letter-spacing:.22em; text-transform:uppercase;
  }
  h1{
    font-size:clamp(28px,5vw,40px); font-weight:900; letter-spacing:-.03em; line-height:1.05;
  }
  h1 .g{ color:var(--green); }
  .hint{
    margin-top:12px; color:var(--muted); font-size:14px; font-weight:600; line-height:1.45;
  }
  .hint code{
    color:#eafff1; background:rgba(255,255,255,.06); padding:2px 7px; border-radius:8px;
    font-size:12px;
  }
  .status{
    margin-top:16px; display:inline-flex; align-items:center; gap:8px;
    padding:8px 12px; border-radius:999px; border:1px solid var(--stroke);
    background:var(--glass); font-size:12px; font-weight:800; color:var(--muted);
  }
  .status .dot{
    width:8px; height:8px; border-radius:50%; background:var(--green);
    box-shadow:0 0 10px rgba(100,179,77,.9);
  }

  .block{ margin-top:28px; }
  .block-title{
    font-size:11px; font-weight:900; letter-spacing:.18em; text-transform:uppercase;
    color:var(--muted); margin-bottom:12px;
  }

  .btn{
    appearance:none; cursor:pointer; width:100%;
    display:flex; align-items:center; gap:14px; text-align:left;
    padding:18px 18px; border-radius:20px;
    border:1px solid var(--stroke); background:var(--glass);
    color:#fff; font:inherit; transition:.2s;
  }
  .btn:hover{ border-color:rgba(255,255,255,.28); transform:translateY(-1px); }
  .btn.on{
    border-color:rgba(100,179,77,.75);
    background:rgba(100,179,77,.14);
    box-shadow:0 0 28px rgba(100,179,77,.28);
  }
  .btn .n{
    flex:none; width:42px; height:42px; border-radius:14px;
    display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,.06); font-weight:900; color:var(--muted);
  }
  .btn.on .n{ background:rgba(100,179,77,.2); color:var(--green); }
  .btn .t{ font-size:16px; font-weight:900; }
  .btn .d{ margin-top:3px; font-size:12px; font-weight:600; color:var(--muted); }

  .grid-btns{ display:grid; gap:10px; }
  .grid-btns.two{ grid-template-columns:1fr 1fr; }
  @media (max-width:560px){ .grid-btns.two{ grid-template-columns:1fr; } }

  .valores{ opacity:.45; pointer-events:none; transition:.25s; }
  .valores.active{ opacity:1; pointer-events:auto; }

  .open-pitch{
    margin-top:28px; display:inline-flex; align-items:center; gap:8px;
    padding:14px 18px; border-radius:14px; text-decoration:none;
    background:#fff; color:#05070a; font-weight:900; font-size:14px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <img src="/logo.png" alt="Wagoo" />
      <small>Pitch Next · Controle</small>
    </div>
    <h1>Central de<br><span class="g">controle</span></h1>
    <p class="hint">
      Abra <code>/pitch</code> no projetor (ou outra aba). Os botões abaixo mudam essa tela em tempo real.
    </p>
    <div class="status"><span class="dot"></span> <span id="live">Enviando para /pitch…</span></div>

    <div class="block">
      <div class="block-title">Escolher apresentação</div>
      <div class="grid-btns">
        <button type="button" class="btn on" id="btn-fluxo" data-mode="fluxo">
          <span class="n">A</span>
          <span>
            <div class="t">Fluxo Wagoo</div>
            <div class="d">Página inicial — animação do produto</div>
          </span>
        </button>
        <button type="button" class="btn" id="btn-valores" data-mode="valores">
          <span class="n">B</span>
          <span>
            <div class="t">Valores &amp; números</div>
            <div class="d">Mercado, concorrência, margem e roadmap</div>
          </span>
        </button>
      </div>
    </div>

    <div class="block valores" id="valores-panel">
      <div class="block-title">Slides de valor</div>
      <div class="grid-btns two">
        <button type="button" class="btn slide-btn" data-slide="mercado">
          <span class="n">01</span>
          <span><div class="t">Mercado</div><div class="d">TAM · SAM · SOM</div></span>
        </button>
        <button type="button" class="btn slide-btn" data-slide="concorrencia">
          <span class="n">02</span>
          <span><div class="t">Concorrência</div><div class="d">Tabela 2026</div></span>
        </button>
        <button type="button" class="btn slide-btn" data-slide="margens">
          <span class="n">03</span>
          <span><div class="t">Margens</div><div class="d">88,4% · Unit economics</div></span>
        </button>
        <button type="button" class="btn slide-btn" data-slide="roadmap">
          <span class="n">04</span>
          <span><div class="t">Roadmap</div><div class="d">Ano 1 · R$ 210.834</div></span>
        </button>
      </div>
    </div>

    <a class="open-pitch" href="/pitch" target="_blank" rel="noopener">Abrir /pitch no projetor →</a>
  </div>

<script>
  const CHANNEL = "wagoo-pitchnext";
  const STORAGE = "wagoo-pitchnext-state";
  const bc = ("BroadcastChannel" in window) ? new BroadcastChannel(CHANNEL) : null;
  const live = document.getElementById("live");
  const valoresPanel = document.getElementById("valores-panel");
  const btnFluxo = document.getElementById("btn-fluxo");
  const btnValores = document.getElementById("btn-valores");
  const slideBtns = [...document.querySelectorAll(".slide-btn")];

  let state = { mode: "fluxo", slide: "mercado" };

  function persist(){
    localStorage.setItem(STORAGE, JSON.stringify(state));
    if(bc) bc.postMessage({ type: "pitch", ...state });
    // storage event for same-origin tabs without BroadcastChannel
    localStorage.setItem(STORAGE + ":tick", String(Date.now()));
  }

  function paint(){
    btnFluxo.classList.toggle("on", state.mode === "fluxo");
    btnValores.classList.toggle("on", state.mode === "valores");
    valoresPanel.classList.toggle("active", state.mode === "valores");
    slideBtns.forEach((b) => b.classList.toggle("on", state.mode === "valores" && b.dataset.slide === state.slide));
    live.textContent = state.mode === "fluxo"
      ? "Projetor: Fluxo Wagoo"
      : `Projetor: Valores → ${state.slide}`;
  }

  function setMode(mode){
    state.mode = mode;
    if(mode === "valores" && !state.slide) state.slide = "mercado";
    paint();
    persist();
  }

  function setSlide(slide){
    state.mode = "valores";
    state.slide = slide;
    paint();
    persist();
  }

  btnFluxo.addEventListener("click", () => setMode("fluxo"));
  btnValores.addEventListener("click", () => {
    setMode("valores");
    setSlide(state.slide || "mercado");
  });
  slideBtns.forEach((b) => b.addEventListener("click", () => setSlide(b.dataset.slide)));

  addEventListener("keydown", (e) => {
    if(e.key.toLowerCase() === "a" || e.key === "0") setMode("fluxo");
    if(e.key.toLowerCase() === "b") { setMode("valores"); setSlide(state.slide || "mercado"); }
    const map = { "1":"mercado", "2":"concorrencia", "3":"margens", "4":"roadmap" };
    if(map[e.key]) setSlide(map[e.key]);
    if(state.mode === "valores" && (e.key === "ArrowRight" || e.key === "ArrowLeft")){
      const order = ["mercado","concorrencia","margens","roadmap"];
      const i = order.indexOf(state.slide);
      const next = e.key === "ArrowRight"
        ? order[Math.min(order.length - 1, i + 1)]
        : order[Math.max(0, i - 1)];
      setSlide(next);
    }
  });

  try{
    const saved = JSON.parse(localStorage.getItem(STORAGE) || "null");
    if(saved?.mode) state = { mode: saved.mode, slide: saved.slide || "mercado" };
  }catch{}
  paint();
  persist();
</script>
</body>
</html>
