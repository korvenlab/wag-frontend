<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#05070a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="mobile-web-app-capable" content="yes" />
<title>Wagoo — Pitch Next</title>
<meta name="robots" content="noindex" />
<style>
  :root{
    --green:#64b34d;
    --green-deep:#4d8f3b;
    --ink:#05070a;
    --muted:rgba(255,255,255,.55);
    --glass:rgba(255,255,255,.04);
    --stroke:rgba(255,255,255,.10);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ min-height:100%; min-height:100dvh; }
  body{
    background:
      radial-gradient(900px 600px at 20% 10%, rgba(100,179,77,.16), transparent 55%),
      radial-gradient(800px 700px at 90% 80%, rgba(100,179,77,.1), transparent 50%),
      var(--ink);
    color:#fff;
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
    letter-spacing:-.01em;
    -webkit-font-smoothing:antialiased;
    touch-action:manipulation;
    overscroll-behavior-y:contain;
    overflow:hidden;
  }
  .grid{
    position:fixed; inset:-2px; z-index:0; opacity:.3; pointer-events:none;
    background-image:
      linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px);
    background-size:56px 56px;
    mask-image:radial-gradient(circle at 50% 40%, #000 25%, transparent 75%);
    animation:drift 16s linear infinite;
  }
  @keyframes drift{ to{ background-position:56px 56px, 56px 56px; } }

  .app{
    position:relative; z-index:2;
    min-height:100dvh;
    display:flex; flex-direction:column;
    padding:
      calc(16px + var(--safe-top))
      16px
      calc(18px + var(--safe-bottom));
    gap:14px;
  }

  .hud{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  .brand{ display:flex; align-items:center; gap:10px; min-width:0; }
  .brand img{
    height:26px; width:auto; display:block;
    filter:drop-shadow(0 0 12px rgba(100,179,77,.45));
  }
  .status{
    display:inline-flex; align-items:center; gap:8px; max-width:58%;
    padding:8px 12px; border-radius:999px;
    border:1px solid var(--stroke); background:var(--glass);
    font-size:11px; font-weight:800; color:var(--muted);
  }
  .status #live{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .status .dot{
    flex:none; width:8px; height:8px; border-radius:50%; background:var(--green);
    box-shadow:0 0 12px rgba(100,179,77,.95);
  }
  .status.warn .dot{ background:#f59e0b; box-shadow:0 0 12px rgba(245,158,11,.9); }
  .status.err .dot{ background:#ef4444; box-shadow:0 0 12px rgba(239,68,68,.9); }

  .modes{
    display:grid; grid-template-columns:1fr 1fr; gap:10px;
  }
  .mode{
    appearance:none; cursor:pointer;
    min-height:76px; padding:14px 12px; border-radius:18px;
    border:1px solid var(--stroke); background:var(--glass);
    color:#fff; font:inherit; text-align:center;
    transition:border-color .15s, background .15s, box-shadow .15s, transform .15s;
  }
  .mode:active{ transform:scale(.97); }
  .mode.on{
    border-color:rgba(100,179,77,.8);
    background:rgba(100,179,77,.16);
    box-shadow:0 0 28px rgba(100,179,77,.3);
  }
  .mode .t{ display:block; font-size:15px; font-weight:900; letter-spacing:-.02em; }
  .mode .d{ display:block; margin-top:4px; font-size:11px; font-weight:650; color:var(--muted); }

  .now{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:10px; padding:8px 6px;
  }
  .now .eyebrow{
    font-size:11px; font-weight:900; letter-spacing:.22em; text-transform:uppercase; color:var(--green);
  }
  .now .title{
    font-size:clamp(28px,8vw,40px); font-weight:900; letter-spacing:-.03em; line-height:1.05;
  }
  .now .meta{
    font-size:13px; font-weight:700; color:var(--muted);
  }
  .dots{
    display:flex; gap:7px; flex-wrap:wrap; justify-content:center; margin-top:6px;
  }
  .dots i{
    width:8px; height:8px; border-radius:50%;
    background:rgba(255,255,255,.18);
    transition:background .2s, transform .2s, box-shadow .2s;
  }
  .dots i.on{
    background:var(--green);
    transform:scale(1.25);
    box-shadow:0 0 12px rgba(100,179,77,.8);
  }

  .nav{
    display:grid; grid-template-columns:1fr 1fr; gap:12px;
  }
  .nav .step{
    appearance:none; cursor:pointer;
    min-height:92px; border-radius:22px;
    border:1px solid rgba(100,179,77,.45);
    background:linear-gradient(180deg, rgba(100,179,77,.22), rgba(100,179,77,.08));
    color:#fff; font:inherit;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    box-shadow:0 12px 40px rgba(0,0,0,.35), 0 0 24px rgba(100,179,77,.18);
    transition:transform .15s, box-shadow .15s, opacity .15s;
  }
  .nav .step:active{ transform:scale(.96); }
  .nav .step:disabled{ opacity:.35; pointer-events:none; }
  .nav .step .arrow{ font-size:28px; font-weight:900; line-height:1; color:var(--green); }
  .nav .step .label{ font-size:14px; font-weight:900; letter-spacing:-.01em; }

  .hint{
    text-align:center; font-size:11px; font-weight:700; color:var(--muted);
    letter-spacing:.04em;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="app">
    <div class="hud">
      <div class="brand"><img src="/logo.png" alt="Wagoo" /></div>
      <div class="status" id="status"><span class="dot"></span><span id="live">Conectando…</span></div>
    </div>

    <div class="modes">
      <button type="button" class="mode on" id="btn-fluxo">
        <span class="t">Fluxo Wagoo</span>
        <span class="d">Roteiro da apresentação</span>
      </button>
      <button type="button" class="mode" id="btn-valores">
        <span class="t">Valores &amp; números</span>
        <span class="d">Mercado e finanças</span>
      </button>
    </div>

    <div class="now">
      <div class="eyebrow" id="deck-label">Fluxo</div>
      <div class="title" id="slide-title">Dor · cliente</div>
      <div class="meta" id="slide-meta">1 / 8</div>
      <div class="dots" id="dots" aria-hidden="true"></div>
    </div>

    <div class="nav">
      <button type="button" class="step" id="step-prev">
        <span class="arrow">◀</span>
        <span class="label">Anterior</span>
      </button>
      <button type="button" class="step" id="step-next">
        <span class="arrow">▶</span>
        <span class="label">Próximo</span>
      </button>
    </div>

    <p class="hint">Deslize ← → · controla o projetor em /pitch</p>
  </div>

<script>
  const CHANNEL = "wagoo-pitchnext";
  const STORAGE = "wagoo-pitchnext-state";
  const API_BASE = "https://wag-backend.onrender.com";
  const REMOTE_URL = `${API_BASE}/api/pitch/remote`;
  const CLIENT_ID = "pitchnext-" + Math.random().toString(36).slice(2, 10);

  const FLUXO_ORDER = [
    "dor-cliente","dor-negocio","canal","solucao","demo","setup","seguranca","outro",
  ];
  const VALORES_ORDER = ["mercado","concorrencia","margens","roadmap","fechamento"];
  const LABELS = {
    "dor-cliente": "Dor · cliente",
    "dor-negocio": "Dor · negócio",
    canal: "Canal",
    solucao: "Solução",
    demo: "Demo ao vivo",
    setup: "Setup único",
    seguranca: "Segurança",
    outro: "Preço",
    mercado: "Mercado",
    concorrencia: "Concorrência",
    margens: "Margens",
    roadmap: "Roadmap",
    fechamento: "Fechamento",
  };

  const bc = ("BroadcastChannel" in window) ? new BroadcastChannel(CHANNEL) : null;
  const live = document.getElementById("live");
  const statusEl = document.getElementById("status");
  const btnFluxo = document.getElementById("btn-fluxo");
  const btnValores = document.getElementById("btn-valores");
  const deckLabel = document.getElementById("deck-label");
  const slideTitle = document.getElementById("slide-title");
  const slideMeta = document.getElementById("slide-meta");
  const dotsEl = document.getElementById("dots");
  const stepPrev = document.getElementById("step-prev");
  const stepNext = document.getElementById("step-next");

  let state = { mode: "fluxo", slide: "dor-cliente" };
  let knownRev = 0;
  let knownIntentAt = 0;
  let localIntentAt = 0;
  let writeTimer = null;
  let writing = false;
  let pollInFlight = false;
  let quietUntil = 0;
  let apiOk = null;

  function buzz(){ try{ if(navigator.vibrate) navigator.vibrate(12); }catch{} }

  function setStatus(kind, text){
    statusEl.classList.remove("warn", "err");
    if(kind === "warn") statusEl.classList.add("warn");
    if(kind === "err") statusEl.classList.add("err");
    live.textContent = text;
  }

  function orderFor(mode){
    return mode === "fluxo" ? FLUXO_ORDER : VALORES_ORDER;
  }

  function paint(){
    const order = orderFor(state.mode);
    const idx = Math.max(0, order.indexOf(state.slide));
    const isFluxo = state.mode === "fluxo";

    btnFluxo.classList.toggle("on", isFluxo);
    btnValores.classList.toggle("on", !isFluxo);
    deckLabel.textContent = isFluxo ? "Fluxo Wagoo" : "Valores & números";
    slideTitle.textContent = LABELS[state.slide] || state.slide;
    slideMeta.textContent = `${idx + 1} / ${order.length}`;
    dotsEl.innerHTML = order.map((_, i) => `<i class="${i === idx ? "on" : ""}"></i>`).join("");
    stepPrev.disabled = idx <= 0;
    stepNext.disabled = idx >= order.length - 1;

    if(writing || writeTimer){
      setStatus("warn", "Enviando…");
    } else if(apiOk === false){
      setStatus("err", "Sem API — sync local");
    } else {
      setStatus(apiOk ? "ok" : "warn", apiOk ? "Projetor sincronizado" : "Conectando…");
    }
  }

  function broadcast(payload){
    try{
      localStorage.setItem(STORAGE, JSON.stringify(payload));
      localStorage.setItem(STORAGE + ":tick", String(Date.now()));
    }catch{}
    if(bc) bc.postMessage(payload);
  }

  async function postRemote(payload){
    const res = await fetch(REMOTE_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json", Accept: "application/json" },
      body: JSON.stringify(payload),
      cache: "no-store",
    });
    if(!res.ok) throw new Error(String(res.status));
    return res.json();
  }

  function schedulePublish(){
    quietUntil = Date.now() + 2500;
    const intentAt = localIntentAt;
    broadcast({
      type: "pitch",
      mode: state.mode,
      slide: state.slide,
      intentAt,
      rev: knownRev,
      from: CLIENT_ID,
    });
    clearTimeout(writeTimer);
    writeTimer = setTimeout(() => {
      writeTimer = null;
      void flushWrite(intentAt);
      paint();
    }, 120);
    paint();
  }

  async function flushWrite(intentAt){
    if(writing) return;
    if(intentAt !== localIntentAt) return;
    writing = true;
    paint();
    const payload = { mode: state.mode, slide: state.slide, intentAt };
    try{
      let ok = false;
      for(let i = 0; i < 3; i++){
        try{
          const data = await postRemote(payload);
          if(typeof data.rev === "number") knownRev = Math.max(knownRev, data.rev);
          if(typeof data.intentAt === "number") knownIntentAt = Math.max(knownIntentAt, data.intentAt);
          apiOk = true;
          quietUntil = Date.now() + 800;
          ok = true;
          break;
        }catch{
          await new Promise((r) => setTimeout(r, 300 * (i + 1)));
        }
      }
      if(!ok) apiOk = false;
    }finally{
      writing = false;
      paint();
      if(localIntentAt !== intentAt) schedulePublish();
    }
  }

  function commitLocal(nextMode, nextSlide){
    const order = orderFor(nextMode);
    if(!order.includes(nextSlide)) nextSlide = order[0];
    if(nextMode === state.mode && nextSlide === state.slide) return;
    state = { mode: nextMode, slide: nextSlide };
    localIntentAt = Date.now();
    knownIntentAt = Math.max(knownIntentAt, localIntentAt);
    buzz();
    schedulePublish();
  }

  function setMode(mode){
    const order = orderFor(mode);
    const slide = order.includes(state.slide) ? state.slide : order[0];
    commitLocal(mode, slide);
  }

  function step(delta){
    const order = orderFor(state.mode);
    const i = Math.max(0, order.indexOf(state.slide));
    const next = order[Math.min(order.length - 1, Math.max(0, i + delta))];
    if(next === state.slide) return;
    commitLocal(state.mode, next);
  }

  function ingestRemote(raw){
    if(!raw || typeof raw !== "object" || !raw.mode) return;
    if(raw.from === CLIENT_ID) return;

    const nextMode = raw.mode === "valores" ? "valores" : "fluxo";
    const order = orderFor(nextMode);
    const rawSlide = typeof raw.slide === "string" ? raw.slide : "";
    const nextSlide = order.includes(rawSlide) ? rawSlide : order[0];
    const rev = typeof raw.rev === "number" ? raw.rev : null;
    const intentAt = typeof raw.intentAt === "number" ? raw.intentAt : null;

    if(Date.now() < quietUntil){
      if(intentAt == null || intentAt <= localIntentAt) return;
    }
    if(rev != null && rev < knownRev) return;
    if(intentAt != null && intentAt < knownIntentAt) return;

    if(rev != null) knownRev = Math.max(knownRev, rev);
    if(intentAt != null) knownIntentAt = Math.max(knownIntentAt, intentAt);

    if(nextMode === state.mode && nextSlide === state.slide){
      if(apiOk === false) apiOk = true;
      paint();
      return;
    }

    state = { mode: nextMode, slide: nextSlide };
    paint();
  }

  async function pollRemote(){
    if(pollInFlight) return;
    if(Date.now() < quietUntil) return;
    pollInFlight = true;
    try{
      const res = await fetch(REMOTE_URL, { headers: { Accept: "application/json" }, cache: "no-store" });
      if(!res.ok) return;
      ingestRemote(await res.json());
      if(apiOk === false) apiOk = true;
      paint();
    }catch{}
    finally{ pollInFlight = false; }
  }

  btnFluxo.addEventListener("click", () => setMode("fluxo"));
  btnValores.addEventListener("click", () => setMode("valores"));
  stepPrev.addEventListener("click", () => step(-1));
  stepNext.addEventListener("click", () => step(1));

  let touchX = null, touchY = null;
  addEventListener("touchstart", (e) => {
    const t = e.changedTouches[0];
    touchX = t?.clientX ?? null;
    touchY = t?.clientY ?? null;
  }, { passive: true });
  addEventListener("touchend", (e) => {
    if(touchX == null) return;
    const t = e.changedTouches[0];
    const dx = (t?.clientX ?? touchX) - touchX;
    const dy = (t?.clientY ?? touchY) - (touchY ?? 0);
    touchX = null; touchY = null;
    if(Math.abs(dx) < 56 || Math.abs(dx) < Math.abs(dy) * 1.2) return;
    if(dx < 0) step(1); else step(-1);
  }, { passive: true });

  addEventListener("keydown", (e) => {
    if(e.key === "ArrowRight"){ e.preventDefault(); step(1); }
    if(e.key === "ArrowLeft"){ e.preventDefault(); step(-1); }
  });

  if(bc){
    bc.onmessage = (ev) => { if(ev.data?.type === "pitch") ingestRemote(ev.data); };
  }
  addEventListener("storage", (e) => {
    if(e.key !== STORAGE && e.key !== STORAGE + ":tick") return;
    try{ ingestRemote(JSON.parse(localStorage.getItem(STORAGE) || "null")); }catch{}
  });

  try{
    const saved = JSON.parse(localStorage.getItem(STORAGE) || "null");
    if(saved?.mode){
      const m = saved.mode === "valores" ? "valores" : "fluxo";
      const order = orderFor(m);
      const s = order.includes(saved.slide) ? saved.slide : order[0];
      state = { mode: m, slide: s };
      if(typeof saved.rev === "number") knownRev = saved.rev;
      if(typeof saved.intentAt === "number") knownIntentAt = saved.intentAt;
    }
  }catch{}
  paint();
  void (async () => {
    try{
      const res = await fetch(REMOTE_URL, { headers: { Accept: "application/json" }, cache: "no-store" });
      if(res.ok){
        ingestRemote(await res.json());
        apiOk = true;
        paint();
        return;
      }
    }catch{}
    schedulePublish();
  })();
  setInterval(() => { void pollRemote(); }, 1000);
</script>
</body>
</html>
