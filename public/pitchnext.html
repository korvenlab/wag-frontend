<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#05070a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="mobile-web-app-capable" content="yes" />
<title>Wagoo — Pitch Next</title>
<meta name="robots" content="noindex" />
<style>
  :root{
    --green:#64b34d;
    --green-deep:#4d8f3b;
    --ink:#05070a;
    --neon:#eafff1;
    --muted:rgba(255,255,255,.55);
    --glass:rgba(255,255,255,.04);
    --stroke:rgba(255,255,255,.10);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --dock-h: 132px;
  }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ min-height:100%; min-height:100dvh; }
  body{
    background:
      radial-gradient(1200px 700px at 18% 12%, rgba(100,179,77,.14), transparent 60%),
      radial-gradient(1000px 800px at 88% 88%, rgba(100,179,77,.10), transparent 55%),
      radial-gradient(900px 900px at 50% 50%, rgba(255,255,255,.03), transparent 60%),
      var(--ink);
    color:#fff;
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
    letter-spacing:-.01em;
    -webkit-font-smoothing:antialiased;
    touch-action:manipulation;
    overscroll-behavior-y:contain;
    overflow-x:hidden;
  }

  .grid{
    position:fixed; inset:-2px; z-index:0; opacity:.35; pointer-events:none;
    background-image:
      linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px);
    background-size:64px 64px;
    mask-image:radial-gradient(circle at 50% 45%, #000 28%, transparent 78%);
    animation:drift 18s linear infinite;
  }
  @keyframes drift{ to{ background-position:64px 64px, 64px 64px; } }
  .vignette{
    position:fixed; inset:0; z-index:1; pointer-events:none;
    background:radial-gradient(120% 120% at 50% 40%, transparent 55%, rgba(0,0,0,.55) 100%);
  }

  .app{
    position:relative; z-index:2;
    min-height:100dvh;
    display:flex; flex-direction:column;
    padding:
      calc(14px + var(--safe-top))
      14px
      calc(var(--dock-h) + var(--safe-bottom) + 18px);
  }

  .wrap{
    width:min(760px,100%);
    margin:0 auto;
    flex:1;
  }

  .hud{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    margin-bottom:14px;
  }
  .brand{ display:flex; align-items:center; gap:10px; min-width:0; }
  .brand img{
    height:26px; width:auto; display:block; flex:none;
    filter:drop-shadow(0 0 12px rgba(100,179,77,.45));
  }
  .brand small{
    font-weight:700; color:var(--muted);
    letter-spacing:.2em; text-transform:uppercase; font-size:10px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .status{
    display:inline-flex; align-items:center; gap:8px; max-width:62%;
    padding:8px 12px; border-radius:999px;
    border:1px solid var(--stroke); background:var(--glass);
    backdrop-filter:blur(8px);
    font-size:11px; font-weight:800; color:var(--muted);
  }
  .status span#live{
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .status .dot{
    flex:none; width:8px; height:8px; border-radius:50%; background:var(--green);
    box-shadow:0 0 12px rgba(100,179,77,.95);
  }
  .status.warn .dot{ background:#f59e0b; box-shadow:0 0 12px rgba(245,158,11,.9); }
  .status.err .dot{ background:#ef4444; box-shadow:0 0 12px rgba(239,68,68,.9); }

  .hero{ text-align:center; margin-bottom:4px; }
  .logo-wrap{
    position:relative; display:flex; justify-content:center; margin:2px 0 10px;
  }
  .logo-wrap::before{
    content:""; position:absolute; width:70%; height:180%;
    background:radial-gradient(circle, rgba(100,179,77,.28), transparent 65%);
    filter:blur(10px); z-index:-1;
  }
  .logo-mark{
    width:min(180px,42vw); height:auto; display:block;
    filter:drop-shadow(0 12px 40px rgba(100,179,77,.45));
  }
  .eyebrow{
    display:inline-flex; margin-bottom:8px; padding:7px 12px; border-radius:999px;
    border:1px solid rgba(100,179,77,.4); background:rgba(100,179,77,.1);
    color:var(--green); font-size:10px; font-weight:900; letter-spacing:.18em; text-transform:uppercase;
  }
  h1{
    font-size:clamp(26px,7.5vw,44px); font-weight:900;
    letter-spacing:-.035em; line-height:1.02;
  }
  h1 .g{ color:var(--green); position:relative; }
  h1 .g::after{
    content:""; position:absolute; left:0; right:0; bottom:.08em; height:3px; border-radius:9px;
    background:rgba(100,179,77,.55); box-shadow:0 0 14px rgba(100,179,77,.7);
  }
  .hint{
    margin:8px auto 0; max-width:520px;
    color:var(--muted); font-size:13px; font-weight:600; line-height:1.45;
  }
  .hint code{
    color:var(--neon); background:rgba(255,255,255,.06);
    border:1px solid var(--stroke); padding:2px 7px; border-radius:8px; font-size:11px;
  }

  .block{ margin-top:18px; }
  .block-title{
    font-size:10px; font-weight:900; letter-spacing:.18em; text-transform:uppercase;
    color:var(--muted); margin-bottom:10px; text-align:center;
  }

  .grid-btns{ display:grid; gap:10px; }
  .grid-btns.two{ grid-template-columns:1fr 1fr; }

  .btn{
    appearance:none; cursor:pointer; width:100%;
    display:flex; align-items:center; gap:12px; text-align:left;
    min-height:64px;
    padding:14px; border-radius:18px;
    border:1px solid var(--stroke); background:var(--glass);
    color:#fff; font:inherit;
    backdrop-filter:blur(8px);
    transition:border-color .15s, box-shadow .15s, transform .15s, background .15s, opacity .15s;
    touch-action:manipulation; user-select:none;
  }
  .btn:active{ transform:scale(.97); }
  .btn.on{
    border-color:rgba(100,179,77,.75);
    background:rgba(100,179,77,.14);
    box-shadow:0 0 28px rgba(100,179,77,.32), inset 0 0 20px rgba(100,179,77,.06);
  }
  .btn .n{
    flex:none; width:42px; height:42px; border-radius:14px;
    display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,.05); border:1px solid var(--stroke);
    font-weight:900; color:var(--muted); font-size:14px;
  }
  .btn.on .n{
    background:rgba(100,179,77,.2); border-color:rgba(100,179,77,.45); color:var(--green);
    box-shadow:0 0 16px rgba(100,179,77,.35);
  }
  .btn .copy{ min-width:0; flex:1; }
  .btn .t{ font-size:15px; font-weight:900; letter-spacing:-.02em; }
  .btn .d{ margin-top:2px; font-size:11px; font-weight:600; color:var(--muted); line-height:1.3; }

  .valores{
    opacity:.38; pointer-events:none;
    transition:opacity .3s ease, transform .3s ease;
    transform:translateY(6px);
  }
  .valores.active{ opacity:1; pointer-events:auto; transform:none; }

  .swipe-hint{
    display:none;
    margin-top:12px; text-align:center;
    font-size:11px; font-weight:700; color:var(--muted);
    letter-spacing:.06em; text-transform:uppercase;
  }
  .valores.active .swipe-hint{ display:block; }

  .open-pitch{
    display:flex; align-items:center; justify-content:center; gap:8px;
    margin-top:16px; width:100%; min-height:48px;
    padding:12px 16px; border-radius:14px; text-decoration:none;
    border:1px solid var(--stroke); background:var(--glass);
    color:var(--muted); font-weight:800; font-size:13px;
    touch-action:manipulation;
  }

  /* Dock fixo — polegar no celular */
  .dock{
    position:fixed; left:0; right:0; bottom:0; z-index:30;
    padding:10px 14px calc(10px + var(--safe-bottom));
    background:linear-gradient(180deg, transparent, rgba(5,7,10,.88) 22%, rgba(5,7,10,.96));
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
  }
  .dock-inner{
    width:min(760px,100%); margin:0 auto;
    display:grid; grid-template-columns:1fr 1fr; gap:8px;
  }
  .dock .btn{
    min-height:52px; justify-content:center; text-align:center;
    border-radius:14px; padding:10px;
  }
  .dock .btn .n,
  .dock .btn .d{ display:none; }
  .dock-nav{
    display:none;
    width:min(760px,100%); margin:8px auto 0;
    grid-template-columns:repeat(4, 1fr); gap:8px;
  }
  .dock-nav.show{ display:grid; }
  .dock-nav .chip{
    appearance:none; cursor:pointer;
    min-height:48px; border-radius:12px;
    border:1px solid var(--stroke); background:rgba(255,255,255,.05);
    color:var(--muted); font:inherit; font-size:13px; font-weight:900;
    touch-action:manipulation;
  }
  .dock-nav .chip:active{ transform:scale(.96); }
  .dock-nav .chip.on{
    color:#fff; border-color:rgba(100,179,77,.75);
    background:rgba(100,179,77,.16);
    box-shadow:0 0 18px rgba(100,179,77,.28);
  }
  .dock-step{
    display:none;
    width:min(760px,100%); margin:8px auto 0;
    grid-template-columns:1fr 1fr; gap:8px;
  }
  .dock-step.show{ display:grid; }
  .dock-step .step{
    appearance:none; cursor:pointer;
    min-height:48px; border-radius:12px;
    border:1px solid var(--stroke); background:rgba(255,255,255,.05);
    color:#fff; font:inherit; font-size:14px; font-weight:900;
    touch-action:manipulation;
  }
  .dock-step .step:active{ transform:scale(.97); }

  @media (min-width:720px){
    :root{ --dock-h: 120px; }
    .app{ padding-left:22px; padding-right:22px; padding-top:calc(24px + var(--safe-top)); }
    .logo-mark{ width:min(240px,36vw); }
    .hint{ font-size:15px; }
    .btn{ min-height:68px; padding:16px 18px; }
    .btn .t{ font-size:16px; }
    .btn .d{ font-size:12px; }
  }

  @media (max-width:420px){
    .brand small{ display:none; }
    .grid-btns.two{ grid-template-columns:1fr; }
    .logo-wrap{ margin-bottom:6px; }
    .logo-mark{ width:min(150px,40vw); }
    h1{ font-size:clamp(24px,8.5vw,34px); }
    .status{ max-width:70%; font-size:10px; padding:7px 10px; }
  }

  @media (max-height:720px){
    .logo-wrap{ display:none; }
    .hero .hint{ display:none; }
  }

  @media (max-height:560px){
    .hero h1{ font-size:22px; }
    .eyebrow{ display:none; }
    .block{ margin-top:12px; }
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="vignette"></div>

  <div class="app">
    <div class="wrap">
      <div class="hud">
        <div class="brand">
          <img src="/logo.png" alt="Wagoo" />
          <small>by Korven Lab</small>
        </div>
        <div class="status" id="status"><span class="dot"></span> <span id="live">Conectando…</span></div>
      </div>

      <div class="hero">
        <div class="logo-wrap">
          <img class="logo-mark" src="/logo.png" alt="Wagoo" />
        </div>
        <div class="eyebrow">Pitch Next · Controle</div>
        <h1>Central de<br><span class="g">controle.</span></h1>
        <p class="hint">
          Projetor em <code>/pitch</code>. Celular manda o sinal em tempo real.
        </p>
      </div>

      <div class="block">
        <div class="block-title">Escolher apresentação</div>
        <div class="grid-btns">
          <button type="button" class="btn on" id="btn-fluxo">
            <span class="n">A</span>
            <span class="copy">
              <div class="t">Fluxo Wagoo</div>
              <div class="d">Animação — “Sua agenda no automático”</div>
            </span>
          </button>
          <button type="button" class="btn" id="btn-valores">
            <span class="n">B</span>
            <span class="copy">
              <div class="t">Valores &amp; números</div>
              <div class="d">Mercado, concorrência, margem e roadmap</div>
            </span>
          </button>
        </div>
      </div>

      <div class="block valores" id="valores-panel">
        <div class="block-title">Slides de valor</div>
        <div class="grid-btns two">
          <button type="button" class="btn slide-btn" data-slide="mercado">
            <span class="n">01</span>
            <span class="copy"><div class="t">Mercado</div><div class="d">TAM · SAM · SOM</div></span>
          </button>
          <button type="button" class="btn slide-btn" data-slide="concorrencia">
            <span class="n">02</span>
            <span class="copy"><div class="t">Concorrência</div><div class="d">Tabela 2026</div></span>
          </button>
          <button type="button" class="btn slide-btn" data-slide="margens">
            <span class="n">03</span>
            <span class="copy"><div class="t">Margens</div><div class="d">88,4% · Unit economics</div></span>
          </button>
          <button type="button" class="btn slide-btn" data-slide="roadmap">
            <span class="n">04</span>
            <span class="copy"><div class="t">Roadmap</div><div class="d">Ano 1 · R$ 210.834</div></span>
          </button>
        </div>
        <p class="swipe-hint">Deslize ← → ou use ◀ ▶ no rodapé</p>
      </div>

      <a class="open-pitch" href="/pitch" target="_blank" rel="noopener">Abrir /pitch nesta tela →</a>
    </div>
  </div>

  <div class="dock">
    <div class="dock-inner">
      <button type="button" class="btn on" id="dock-fluxo"><span class="copy"><div class="t">Fluxo</div></span></button>
      <button type="button" class="btn" id="dock-valores"><span class="copy"><div class="t">Valores</div></span></button>
    </div>
    <div class="dock-nav" id="dock-nav">
      <button type="button" class="chip" data-slide="mercado">01</button>
      <button type="button" class="chip" data-slide="concorrencia">02</button>
      <button type="button" class="chip" data-slide="margens">03</button>
      <button type="button" class="chip" data-slide="roadmap">04</button>
    </div>
    <div class="dock-step" id="dock-step">
      <button type="button" class="step" id="step-prev">◀ Anterior</button>
      <button type="button" class="step" id="step-next">Próximo ▶</button>
    </div>
  </div>

<script>
  const CHANNEL = "wagoo-pitchnext";
  const STORAGE = "wagoo-pitchnext-state";
  const API_BASE = "https://wag-backend.onrender.com";
  const REMOTE_URL = `${API_BASE}/api/pitch/remote`;
  const ORDER = ["mercado", "concorrencia", "margens", "roadmap"];
  const LABELS = {
    mercado: "Mercado",
    concorrencia: "Concorrência",
    margens: "Margens",
    roadmap: "Roadmap",
  };

  const bc = ("BroadcastChannel" in window) ? new BroadcastChannel(CHANNEL) : null;
  const live = document.getElementById("live");
  const statusEl = document.getElementById("status");
  const valoresPanel = document.getElementById("valores-panel");
  const dockNav = document.getElementById("dock-nav");
  const dockStep = document.getElementById("dock-step");
  const btnFluxo = document.getElementById("btn-fluxo");
  const btnValores = document.getElementById("btn-valores");
  const dockFluxo = document.getElementById("dock-fluxo");
  const dockValores = document.getElementById("dock-valores");
  const slideBtns = [...document.querySelectorAll(".slide-btn")];
  const chips = [...document.querySelectorAll(".dock-nav .chip")];

  let state = { mode: "fluxo", slide: "mercado" };
  let syncing = false;
  let apiOk = null;

  function buzz(){
    try{ if(navigator.vibrate) navigator.vibrate(12); }catch{}
  }

  function setStatus(kind, text){
    statusEl.classList.remove("warn", "err");
    if(kind === "warn") statusEl.classList.add("warn");
    if(kind === "err") statusEl.classList.add("err");
    live.textContent = text;
  }

  function statusLabel(){
    return state.mode === "fluxo"
      ? "Projetor: Fluxo Wagoo"
      : `Projetor: ${LABELS[state.slide] || state.slide}`;
  }

  function paint(){
    const isFluxo = state.mode === "fluxo";
    const isValores = state.mode === "valores";
    [btnFluxo, dockFluxo].forEach((b) => b.classList.toggle("on", isFluxo));
    [btnValores, dockValores].forEach((b) => b.classList.toggle("on", isValores));
    valoresPanel.classList.toggle("active", isValores);
    dockNav.classList.toggle("show", isValores);
    dockStep.classList.toggle("show", isValores);
    document.documentElement.style.setProperty("--dock-h", isValores ? "200px" : "88px");
    slideBtns.forEach((b) => b.classList.toggle("on", isValores && b.dataset.slide === state.slide));
    chips.forEach((b) => b.classList.toggle("on", isValores && b.dataset.slide === state.slide));
    if(!syncing){
      if(apiOk === false) setStatus("err", "Sem API — sync só nesta aba/PC");
      else setStatus(apiOk ? "ok" : "warn", apiOk ? statusLabel() : "Conectando…");
    }
  }

  async function postRemote(attempt){
    const res = await fetch(REMOTE_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json", Accept: "application/json" },
      body: JSON.stringify(state),
    });
    if(!res.ok) throw new Error(String(res.status));
    return res.json();
  }

  async function persist(){
    localStorage.setItem(STORAGE, JSON.stringify(state));
    if(bc) bc.postMessage({ type: "pitch", ...state });
    localStorage.setItem(STORAGE + ":tick", String(Date.now()));

    syncing = true;
    setStatus("warn", "Enviando ao projetor…");
    paint();
    try{
      let lastErr;
      for(let i = 0; i < 3; i++){
        try{
          await postRemote(i);
          lastErr = null;
          break;
        }catch(err){
          lastErr = err;
          await new Promise((r) => setTimeout(r, 400 * (i + 1)));
        }
      }
      if(lastErr) throw lastErr;
      apiOk = true;
      syncing = false;
      setStatus("ok", statusLabel());
    }catch{
      apiOk = false;
      syncing = false;
      setStatus("err", "Sem API — sync só nesta aba/PC");
    }
  }

  function setMode(mode){
    state.mode = mode;
    if(mode === "valores" && !state.slide) state.slide = "mercado";
    buzz();
    paint();
    void persist();
    if(mode === "valores"){
      valoresPanel.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }
  }

  function setSlide(slide){
    state.mode = "valores";
    state.slide = slide;
    buzz();
    paint();
    void persist();
  }

  function step(delta){
    const i = Math.max(0, ORDER.indexOf(state.slide));
    const next = ORDER[Math.min(ORDER.length - 1, Math.max(0, i + delta))];
    setSlide(next);
  }

  btnFluxo.addEventListener("click", () => setMode("fluxo"));
  dockFluxo.addEventListener("click", () => setMode("fluxo"));
  btnValores.addEventListener("click", () => setSlide(state.slide || "mercado"));
  dockValores.addEventListener("click", () => setSlide(state.slide || "mercado"));
  slideBtns.forEach((b) => b.addEventListener("click", () => setSlide(b.dataset.slide)));
  chips.forEach((b) => b.addEventListener("click", () => setSlide(b.dataset.slide)));
  document.getElementById("step-prev").addEventListener("click", () => step(-1));
  document.getElementById("step-next").addEventListener("click", () => step(1));

  let touchX = null;
  let touchY = null;
  addEventListener("touchstart", (e) => {
    const t = e.changedTouches[0];
    touchX = t?.clientX ?? null;
    touchY = t?.clientY ?? null;
  }, { passive: true });
  addEventListener("touchend", (e) => {
    if(touchX == null || state.mode !== "valores") return;
    const t = e.changedTouches[0];
    const dx = (t?.clientX ?? touchX) - touchX;
    const dy = (t?.clientY ?? touchY) - (touchY ?? 0);
    touchX = null;
    touchY = null;
    if(Math.abs(dx) < 56 || Math.abs(dx) < Math.abs(dy) * 1.2) return;
    if(dx < 0) step(1);
    else step(-1);
  }, { passive: true });

  try{
    const saved = JSON.parse(localStorage.getItem(STORAGE) || "null");
    if(saved?.mode) state = { mode: saved.mode, slide: saved.slide || "mercado" };
  }catch{}
  paint();
  void persist();
</script>
</body>
</html>
